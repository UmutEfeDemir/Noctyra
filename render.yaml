services:
  - type: web
    name: noctyra
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEON_CONN
        sync: false   # set this in the Render dashboard — never commit the value
    autoDeploy: true
